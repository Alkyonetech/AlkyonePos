<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{brand} — Maliyet Girisi</title>
<style>
  :root{ --brand-primary:#7C5CFF; --brand-accent:#5CE0D8; --brand-bg:#0B0B14; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--brand-bg);color:#e8e8f0}
  header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #22223a;flex-wrap:wrap}
  header img{width:32px;height:32px}
  header h1{font-size:17px;margin:0}
  .spacer{flex:1}
  a.btn,button{background:#17172a;color:#e8e8f0;border:1px solid #2c2c46;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none}
  button.pri{background:var(--brand-primary);border-color:var(--brand-primary);color:#fff;font-weight:600}
  main{padding:20px;max-width:760px;margin:0 auto}
  .est{background:#12122099;border:1px solid #22223a;border-radius:12px;padding:16px;margin-bottom:20px}
  .est h2{font-size:14px;margin:0 0 8px;color:#b9a8ff}
  .est .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  input{background:#0e0e1c;color:#e8e8f0;border:1px solid #2c2c46;border-radius:8px;padding:8px 10px;font-size:14px;width:90px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid #1e1e34}
  th{color:#8a8aa5;font-weight:500}
  td.num{text-align:right}
  .miss{color:#e0a24f}
  .ok{color:#7fe07f}
  .muted{color:#6a6a85;font-size:12px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c3a1c;padding:10px 18px;border-radius:8px;opacity:0;transition:.3s;color:#7fe07f}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <img data-brand-logo alt="logo"><h1><span data-brand="short"></span> · Maliyet Girisi</h1>
  <div class="spacer"></div>
  <a class="btn" href="/analitik">← Analitik</a>
</header>
<main>
  <div class="est">
    <h2>Hizli tahmin (maliyet bilmiyorsaniz)</h2>
    <div class="row">
      Satis fiyatinin
      <input id="pct" type="number" value="35" min="1" max="99"> %'i
      <button class="pri" onclick="estimate()">Maliyeti olmayanlara uygula</button>
    </div>
    <div class="muted" style="margin-top:8px">Baslangic icin kaba bir tahmin. Sonra gercek maliyetleri asagidan tek tek guncelleyin — kar hesabi netlesir.</div>
  </div>

  <table><thead><tr>
    <th>Urun</th><th class="num">Satis</th><th class="num">Guncel maliyet</th><th class="num">Yeni maliyet (TL)</th><th></th>
  </tr></thead><tbody id="rows"><tr><td colspan="5" class="muted">Yukleniyor...</td></tr></tbody></table>
</main>
<div class="toast" id="toast"></div>

<script src="/js/brand.js"></script>
<script>
const fmt = k => k==null ? null : (k/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
const api = (p,opt) => fetch(p,opt).then(r=>r.json());
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

async function load(){
  const {items} = await api('/api/alkyone/items');
  const tb=document.getElementById('rows');
  if(!items.length){ tb.innerHTML='<tr><td colspan="5" class="muted">Henuz urun yok. POS menusu senkronlaninca (siparis kapaninca veya /api/alkyone/sync-menu) burada gorunur.</td></tr>'; return; }
  tb.innerHTML = items.map(i=>`<tr data-id="${i.id}">
    <td>${i.name}<div class="muted">${i.category||''}</div></td>
    <td class="num">${fmt(i.salePrice)}</td>
    <td class="num ${i.currentCost==null?'miss':'ok'}">${i.currentCost==null?'girilmedi':fmt(i.currentCost)}</td>
    <td class="num"><input type="number" step="0.01" min="0" placeholder="${fmt(i.salePrice)}"></td>
    <td><button onclick="save(this)">Kaydet</button></td></tr>`).join('');
}
async function save(btn){
  const tr=btn.closest('tr'); const id=tr.dataset.id; const v=tr.querySelector('input').value;
  if(v===''||+v<0){toast('Gecerli tutar girin');return;}
  await api('/api/alkyone/cost',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({itemId:id,costTl:+v})});
  toast('Maliyet kaydedildi'); load();
}
async function estimate(){
  const pct=+document.getElementById('pct').value;
  const r=await api('/api/alkyone/cost/estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pct})});
  toast(r.applied+' urune %'+pct+' tahmini uygulandi'); load();
}
load();
</script>
</body>
</html>
