<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura POS - Ilk Kurulum</title>
  <style>
    :root{--bg:#0f0f1a;--card:#1a1a2e;--input:#222240;--sakura:#e8b4b8;--sakura-d:#c9787e;--text:#e8e8f0;--dim:#8888a0;--border:#2a2a45;--green:#60d080;--red:#e06060}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center}
    .wizard{width:460px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px}
    .logo{text-align:center;font-size:1.6rem;font-weight:700;color:var(--sakura);margin-bottom:4px}
    .subtitle{text-align:center;color:var(--dim);font-size:.85rem;margin-bottom:28px}
    .step{display:none}.step.active{display:block}
    .step-title{font-size:1rem;font-weight:600;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:.8rem;color:var(--dim);margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.9rem;outline:none}
    .form-group input:focus{border-color:var(--sakura)}
    .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
    .btn{padding:10px 24px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer}
    .btn-next{background:linear-gradient(135deg,var(--sakura),var(--sakura-d));color:var(--bg)}
    .btn-back{background:var(--input);color:var(--dim);border:1px solid var(--border)}
    .steps-indicator{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
    .step-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .2s}
    .step-dot.active{background:var(--sakura)}
    .success-icon{text-align:center;font-size:3rem;margin-bottom:12px}
    .success-text{text-align:center;color:var(--green);font-size:1.1rem;font-weight:600;margin-bottom:8px}
    .success-sub{text-align:center;color:var(--dim);font-size:.85rem;margin-bottom:20px}
    .err{color:var(--red);font-size:.8rem;margin-top:4px;display:none}
  </style>
</head>
<body>
  <div class="wizard">
    <div class="logo">Sakura POS</div>
    <div class="subtitle">Ilk Kurulum Sihirbazi</div>
    <div class="steps-indicator">
      <div class="step-dot active" data-step="0"></div>
      <div class="step-dot" data-step="1"></div>
      <div class="step-dot" data-step="2"></div>
      <div class="step-dot" data-step="3"></div>
    </div>

    <!-- ADIM 1: Restoran -->
    <div class="step active" id="step-0">
      <div class="step-title">Restoran Bilgileri</div>
      <div class="form-group"><label>Restoran Adi</label><input type="text" id="s-name" value="Sakura Sushi Fulya"></div>
      <div class="form-group"><label>Adres</label><input type="text" id="s-addr" value="Fulya, Istanbul"></div>
      <div class="form-group"><label>Telefon</label><input type="text" id="s-phone" placeholder="0212 ___ __ __"></div>
      <div class="actions"><button class="btn btn-next" onclick="next()">Devam</button></div>
    </div>

    <!-- ADIM 2: Masalar -->
    <div class="step" id="step-1">
      <div class="step-title">Masa Ayarlari</div>
      <div class="form-group"><label>Salon Masa Sayisi</label><input type="number" id="s-salon" value="6"></div>
      <div class="form-group"><label>Teras Masa Sayisi</label><input type="number" id="s-teras" value="4"></div>
      <div class="form-group"><label>Varsayilan Kapasite</label><input type="number" id="s-cap" value="4"></div>
      <div class="actions">
        <button class="btn btn-back" onclick="prev()">Geri</button>
        <button class="btn btn-next" onclick="next()">Devam</button>
      </div>
    </div>

    <!-- ADIM 3: PIN -->
    <div class="step" id="step-2">
      <div class="step-title">PIN Ayarlari</div>
      <div class="form-group"><label>Garson PIN (4 hane)</label><input type="text" id="s-gpin" maxlength="4" value="1234"></div>
      <div class="form-group"><label>Yonetici PIN (4 hane)</label><input type="text" id="s-ypin" maxlength="4" value="9999"></div>
      <div class="err" id="pin-err">PIN 4 haneli olmali</div>
      <div class="actions">
        <button class="btn btn-back" onclick="prev()">Geri</button>
        <button class="btn btn-next" onclick="next()">Devam</button>
      </div>
    </div>

    <!-- ADIM 4: Tamamlandi -->
    <div class="step" id="step-3">
      <div class="success-icon">&#10003;</div>
      <div class="success-text">Kurulum Tamamlandi!</div>
      <div class="success-sub">Sakura POS kullanima hazir.</div>
      <div class="actions" style="justify-content:center">
        <button class="btn btn-next" onclick="finish()">POS'u Baslat</button>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 0;

    function next() {
      if (currentStep === 2) {
        const gpin = document.getElementById('s-gpin').value;
        const ypin = document.getElementById('s-ypin').value;
        if (gpin.length !== 4 || ypin.length !== 4) {
          document.getElementById('pin-err').style.display = 'block';
          return;
        }
        document.getElementById('pin-err').style.display = 'none';
        saveSetup();
      }
      if (currentStep < 3) {
        currentStep++;
        showStep();
      }
    }

    function prev() {
      if (currentStep > 0) {
        currentStep--;
        showStep();
      }
    }

    function showStep() {
      document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i === currentStep));
      document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i <= currentStep));
    }

    async function saveSetup() {
      const salonCount = parseInt(document.getElementById('s-salon').value) || 6;
      const terasCount = parseInt(document.getElementById('s-teras').value) || 4;
      const capacity = parseInt(document.getElementById('s-cap').value) || 4;

      // Masalar olustur
      const tables = [];
      for (let i = 1; i <= salonCount; i++) {
        tables.push({ id: i, name: `Masa ${i}`, capacity, section: 'salon', currentOrderId: null, status: 'empty' });
      }
      for (let i = 1; i <= terasCount; i++) {
        tables.push({ id: salonCount + i, name: `Teras ${i}`, capacity, section: 'teras', currentOrderId: null, status: 'empty' });
      }

      // Oncelikle login
      const loginRes = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: '9999' })
      });
      const { token } = await loginRes.json();
      const auth = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

      // Settings guncelle
      await fetch('/api/settings', {
        method: 'PUT', headers: auth,
        body: JSON.stringify({
          restaurant: {
            name: document.getElementById('s-name').value,
            address: document.getElementById('s-addr').value,
            phone: document.getElementById('s-phone').value
          },
          auth: {
            garsonPin: document.getElementById('s-gpin').value,
            yoneticiPin: document.getElementById('s-ypin').value
          }
        })
      });

      // Masalari kaydet
      await fetch('/api/tables', {
        method: 'PUT', headers: auth,
        body: JSON.stringify({ version: 1, tables })
      });
    }

    function finish() {
      window.location.href = '/pos';
    }
  </script>
</body>
</html>
