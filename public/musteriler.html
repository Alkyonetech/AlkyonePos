<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Musteriler</title>
<style>
  :root{ --primary:#7C5CFF; --accent:#5CE0D8; --bg:#0B0B14; --card:#12122099; --border:#22223a; --text:#e8e8f0; --dim:#8a8aa5; --red:#e07f7f; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  body{padding-bottom:40px}
  header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,11,20,.92);backdrop-filter:blur(8px);z-index:5}
  header h1{font-size:16px;margin:0;font-weight:600}
  .spacer{flex:1}
  a.btn,button,input{background:#17172a;color:var(--text);border:1px solid #2c2c46;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none}
  a.btn:hover,button:hover{border-color:var(--primary)}
  button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  button.danger{background:#3a1c1c;border-color:#5a2a2a;color:var(--red)}
  main{padding:14px;max-width:800px;margin:0 auto}
  .searchbar{display:flex;gap:8px;margin-bottom:14px}
  .searchbar input{flex:1}
  .cust{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .cust-head{display:flex;align-items:center;gap:10px;cursor:pointer}
  .cust-head .nm{font-weight:600}
  .cust-head .ph{color:var(--dim);font-size:13px}
  .cust-head .meta{margin-left:auto;color:var(--dim);font-size:12px;text-align:right}
  .cust-body{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none}
  .cust.open .cust-body{display:block}
  .addr{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1b1b30;font-size:13px}
  .addr:last-child{border-bottom:0}
  .addr .txt{flex:1}
  .addr .note{color:var(--dim);font-size:12px}
  .rowbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .edit-grid input{width:100%}
  .empty,.muted{color:#6a6a85;font-size:13px}
  .empty{text-align:center;padding:30px}
  dialog{background:#14142a;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:0;width:min(92vw,420px)}
  dialog::backdrop{background:rgba(0,0,0,.5)}
  .dlg{padding:16px}
  .dlg h3{margin:0 0 12px;font-size:15px}
  .dlg input,.dlg textarea{width:100%;margin-bottom:10px}
  .dlg textarea{min-height:60px;resize:vertical}
  .dlg-actions{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<header>
  <a class="btn" href="/yonetici">← Geri</a>
  <h1>Musteriler</h1>
  <div class="spacer"></div>
  <button class="primary" onclick="openNew()">+ Yeni</button>
</header>
<main>
  <div class="searchbar">
    <input id="q" type="search" placeholder="Ad veya telefon ara..." oninput="onSearch()" autocomplete="off">
  </div>
  <div id="list"></div>
</main>

<dialog id="new-dlg">
  <div class="dlg">
    <h3>Yeni Musteri</h3>
    <input id="n-name" placeholder="Ad">
    <input id="n-phone" type="tel" placeholder="Telefon">
    <textarea id="n-address" placeholder="Adres (opsiyonel)"></textarea>
    <input id="n-note" placeholder="Adres notu (opsiyonel)">
    <div class="dlg-actions">
      <button onclick="document.getElementById('new-dlg').close()">Iptal</button>
      <button class="primary" onclick="saveNew()">Kaydet</button>
    </div>
  </div>
</dialog>

<script src="/js/musteriler.js"></script>
</body>
</html>
