<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Sakura Yonetici</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/yonetici.css">
</head>
<body>

  <!-- PIN EKRANI -->
  <div id="pin-screen" class="screen">
    <div class="pin-box">
      <div class="pin-logo">Sakura Yonetici</div>
      <div class="pin-subtitle">PIN giriniz</div>
      <div class="pin-display" id="pin-display">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-pad">
        <button onclick="pinInput('1')">1</button>
        <button onclick="pinInput('2')">2</button>
        <button onclick="pinInput('3')">3</button>
        <button onclick="pinInput('4')">4</button>
        <button onclick="pinInput('5')">5</button>
        <button onclick="pinInput('6')">6</button>
        <button onclick="pinInput('7')">7</button>
        <button onclick="pinInput('8')">8</button>
        <button onclick="pinInput('9')">9</button>
        <button class="btn-clear" onclick="pinClear()">C</button>
        <button onclick="pinInput('0')">0</button>
        <button class="btn-enter" onclick="pinSubmit()">&#10003;</button>
      </div>
    </div>
  </div>

  <!-- ANA EKRAN -->
  <div id="main-screen" class="screen hidden">
    <header class="header">
      <span class="header-logo">Sakura Y</span>
      <div class="header-stats">
        <span class="stat">Ciro <strong id="head-revenue">0</strong></span>
        <span class="stat-sep">|</span>
        <span class="stat">Dolu <strong id="head-tables">0</strong></span>
      </div>
      <div class="header-right">
        <span class="ws-dot" id="ws-dot"></span>
        <button class="logout-btn" onclick="logout()">Cikis</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="tables" onclick="switchTab('tables')">Masalar</button>
      <button class="tab" data-tab="active" onclick="switchTab('active')">Aktif</button>
      <button class="tab" data-tab="today" onclick="switchTab('today')">Bugun</button>
    </div>

    <div class="tab-content" id="tab-tables">
      <div class="tables-grid" id="tables-grid"></div>
    </div>

    <div class="tab-content hidden" id="tab-active">
      <div class="active-list" id="active-list"></div>
    </div>

    <div class="tab-content hidden" id="tab-today">
      <div class="today-cards">
        <div class="report-card">
          <div class="report-label">Bugunku Ciro</div>
          <div class="report-value" id="today-revenue">0 TL</div>
        </div>
        <div class="report-row">
          <div class="report-card sm">
            <div class="report-label">Adisyon</div>
            <div class="report-value" id="today-orders">0</div>
          </div>
          <div class="report-card sm">
            <div class="report-label">Aktif</div>
            <div class="report-value" id="today-open">0</div>
          </div>
          <div class="report-card sm">
            <div class="report-label">Ortalama</div>
            <div class="report-value" id="today-avg">0</div>
          </div>
        </div>
        <div class="report-section-title">En cok satanlar</div>
        <div class="top-list" id="today-top"></div>
        <button class="day-close-btn" id="day-close-btn" onclick="confirmDayClose()">Gun Kapat (Z Raporu)</button>
      </div>
    </div>
  </div>

  <!-- ADISYON EKRANI -->
  <div id="order-screen" class="screen hidden">
    <header class="header">
      <button class="back-btn" onclick="goBack()">&#8249;</button>
      <div class="header-center">
        <span class="header-table" id="order-table-name">Masa 1</span>
        <span class="header-time" id="order-time">12:34 - 45dk</span>
      </div>
      <span class="ws-dot" id="ws-dot-order"></span>
    </header>

    <div class="order-items" id="order-items">
      <div class="empty-state" id="empty-order">
        <p>Henuz urun eklenmedi</p>
        <p class="hint">Asagidan kategori secip urun ekleyin</p>
      </div>
    </div>

    <div class="order-footer">
      <div class="order-total">
        <span>Toplam</span>
        <span class="total-amount" id="order-total">0 TL</span>
      </div>
      <div class="order-actions">
        <button class="send-btn" id="send-btn" onclick="showSentFeedback()">Gonder</button>
        <button class="close-btn" id="close-btn" onclick="openPayModal()">Hesap Kapat</button>
      </div>
    </div>

    <div class="menu-panel">
      <div class="category-chips" id="category-chips"></div>
      <div class="menu-items-scroll" id="menu-items-scroll"></div>
    </div>
  </div>

  <!-- URUN MIKTAR MODALI -->
  <div class="modal hidden" id="qty-modal">
    <div class="modal-box">
      <div class="modal-title" id="qty-item-name">Urun</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="modalQty(-1)">-</button>
        <span class="qty-val" id="qty-val">1</span>
        <button class="qty-btn" onclick="modalQty(1)">+</button>
      </div>
      <div class="qty-price" id="qty-price">0 TL</div>
      <input type="text" id="qty-note" placeholder="Not (opsiyonel)" class="note-input">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeQtyModal()">Iptal</button>
        <button class="modal-confirm" onclick="confirmAdd()">Ekle</button>
      </div>
    </div>
  </div>

  <!-- ODEME MODALI -->
  <div class="modal hidden" id="pay-modal">
    <div class="modal-box pay-box">
      <div class="modal-title">Hesap Kapat</div>
      <div class="pay-row">
        <span>Ara Toplam</span>
        <span id="pay-subtotal">0 TL</span>
      </div>
      <div class="pay-discount">
        <label>Indirim</label>
        <input type="number" id="pay-discount-val" min="0" value="0" inputmode="numeric">
        <select id="pay-discount-type">
          <option value="fixed">TL</option>
          <option value="percent">%</option>
        </select>
      </div>
      <div class="pay-row pay-final">
        <span>Toplam</span>
        <span id="pay-total">0 TL</span>
      </div>
      <div class="pay-method">
        <button class="pay-m active" data-method="nakit" onclick="selectPayMethod('nakit')">Nakit</button>
        <button class="pay-m" data-method="kart" onclick="selectPayMethod('kart')">Kart</button>
        <button class="pay-m" data-method="havale" onclick="selectPayMethod('havale')">Havale</button>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closePayModal()">Iptal</button>
        <button class="modal-confirm" onclick="confirmPay()">Onayla</button>
      </div>
    </div>
  </div>

  <!-- ONAY MODALI -->
  <div class="modal hidden" id="confirm-modal">
    <div class="modal-box">
      <div class="modal-title" id="confirm-title">Emin misiniz?</div>
      <div class="confirm-text" id="confirm-text"></div>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeConfirm()">Iptal</button>
        <button class="modal-confirm danger" id="confirm-ok-btn">Onayla</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <div class="offline-banner hidden" id="offline-banner">Baglanti yok</div>

  <script src="/js/theme.js"></script>
  <script src="/js/time-sync.js"></script>
  <script src="/js/yonetici.js"></script>
<script src="/js/brand.js"></script>
</body>
</html>
