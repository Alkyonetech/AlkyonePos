<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Raporlar</title>
<style>
  :root{ --primary:#7C5CFF; --accent:#5CE0D8; --bg:#0B0B14; --card:#12122099; --border:#22223a; --text:#e8e8f0; --dim:#8a8aa5; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  body{padding-bottom:40px}
  header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,11,20,.92);backdrop-filter:blur(8px);z-index:5}
  header h1{font-size:16px;margin:0;font-weight:600}
  .spacer{flex:1}
  a.btn,button,select,input{background:#17172a;color:var(--text);border:1px solid #2c2c46;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none}
  input[type=date]{padding:7px 10px}
  a.btn:hover,button:hover{border-color:var(--primary)}
  .tabs{display:flex;gap:6px;padding:12px 14px 0;flex-wrap:wrap}
  .tab{flex:1;min-width:90px;text-align:center;background:#12122099;border:1px solid var(--border)}
  .tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
  main{padding:14px;max-width:900px;margin:0 auto}
  .view{display:none}
  .view.active{display:block}
  .range-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .range-bar label{font-size:12px;color:var(--dim)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
  .kpi .v{font-size:21px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .kpi .l{font-size:11px;color:var(--dim);margin-top:4px}
  section{margin-bottom:22px}
  h2{font-size:14px;color:#b9a8ff;border-left:3px solid var(--primary);padding-left:10px;margin:0 0 10px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;overflow-x:auto}
  canvas{width:100%;height:170px;display:block}
  .row{display:grid;grid-template-columns:22px 1fr 60px 84px;gap:8px;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid #1b1b30}
  .row:last-child{border-bottom:0}
  .rank{width:22px;height:22px;border-radius:50%;background:#1e1e34;color:var(--dim);font-size:11px;display:flex;align-items:center;justify-content:center}
  .rank.top3{background:var(--primary);color:#fff}
  .rname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rbar{grid-column:1 / -1;height:5px;background:#1b1b30;border-radius:3px;overflow:hidden;margin-top:-2px}
  .rbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent))}
  .rqty{color:var(--dim);text-align:right;font-variant-numeric:tabular-nums}
  .rrev{text-align:right;font-variant-numeric:tabular-nums}
  .matrix{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .quad{border:1px solid var(--border);border-radius:10px;padding:12px;min-height:80px}
  .quad h3{margin:0 0 8px;font-size:12px}
  .quad ul{margin:0;padding-left:16px;font-size:12px;color:#c8c8dd}
  .q{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .q.star{background:#1c3a1c;color:#7fe07f}.q.plowhorse{background:#3a331c;color:#e0cf7f}
  .q.puzzle{background:#1c2f3a;color:#7fc4e0}.q.dog{background:#3a1c1c;color:#e07f7f}
  .muted,.empty{color:#6a6a85;font-size:12px}
  .empty{text-align:center;padding:20px}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid #1e1e34}
  th{color:var(--dim);font-weight:500}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<header>
  <a class="btn" href="/yonetici">← Geri</a>
  <h1><span data-brand="short">Alkyone</span> Raporlar</h1>
  <div class="spacer"></div>
</header>

<div class="tabs">
  <button class="tab active" data-v="today" onclick="switchView('today')">Bugun</button>
  <button class="tab" data-v="range" onclick="switchView('range')">Aralik</button>
  <button class="tab" data-v="menu" onclick="switchView('menu')">Menu</button>
</div>

<main>
  <!-- BUGUN -->
  <div class="view active" id="view-today">
    <div class="kpis" id="today-kpis"></div>
    <section><h2>Saatlik Ciro</h2><div class="card"><canvas id="today-hourly"></canvas></div></section>
    <section><h2>Kanal Dagilimi</h2><div class="card" id="today-channels"></div></section>
    <section><h2>Cok Satan Urunler</h2><div class="card" id="today-products"></div></section>
  </div>

  <!-- ARALIK -->
  <div class="view" id="view-range">
    <div class="range-bar">
      <label>Baslangic <input type="date" id="r-from"></label>
      <label>Bitis <input type="date" id="r-to"></label>
      <button onclick="loadRange()">Getir</button>
    </div>
    <div class="kpis" id="range-kpis"></div>
    <section><h2>Gunluk Ciro</h2><div class="card"><canvas id="range-daily"></canvas></div></section>
    <section><h2>Kanal Dagilimi</h2><div class="card" id="range-channels"></div></section>
    <section><h2>Odeme Dagilimi</h2><div class="card" id="range-payments"></div></section>
    <section><h2>Cok Satan Urunler</h2><div class="card" id="range-products"></div></section>
  </div>

  <!-- MENU -->
  <div class="view" id="view-menu">
    <div class="range-bar">
      <label>Donem
        <select id="m-days" onchange="loadMenu()">
          <option value="7">Son 7 gun</option>
          <option value="30" selected>Son 30 gun</option>
          <option value="90">Son 90 gun</option>
        </select>
      </label>
    </div>
    <div class="kpis" id="menu-kpis"></div>
    <section><h2>Menu Muhendisligi — populerlik × karlilik</h2>
      <div class="card"><div class="muted" id="menu-note" style="margin-bottom:10px"></div><div class="matrix" id="menu-matrix"></div></div>
    </section>
    <section><h2>Urun Bazinda Satis + Kar</h2>
      <div class="card"><table id="menu-sales"><thead><tr>
        <th>Urun</th><th class="num">Adet</th><th class="num">Ciro</th><th class="num">Kar</th><th class="num">Marj</th><th>Sinif</th>
      </tr></thead><tbody></tbody></table></div>
    </section>
  </div>
</main>

<script src="/js/brand.js"></script>
<script src="/js/yonetici-rapor.js"></script>
</body>
</html>
